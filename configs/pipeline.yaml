stage1_raw:
  demosaic_algorithm: AHD          # AHD | DHT | AAHD
  output_bps: 16
  wb_mode: camera                  # camera = use_camera_wb=True (single-shot real estate)
                                   # neutral = user_wb=[1,1,1,1] (HDR brackets — preserves relative EV)
  denoise_enabled: false           # OFF by default — Mertens averages noise
  denoise_model: nafnet            # nafnet only escalation path
  lens_correction:
    enabled: true
    loose_search_fallback: true    # retry with loose_search=True before giving up
    interpolation: LANCZOS4

stage2_hdr:
  align_method: MTB                # MTB | ECC
  fusion_method: mertens
  mertens_weights:
    contrast: 1.0
    saturation: 1.0
    exposure: 1.0
  single_shot_itm: false           # OFF — needs client sign-off; can hallucinate

stage3_wb:
  estimator: shades_of_gray        # shades_of_gray | mixed_illuminant (RED: needs license)
  series_lock: true                # robust median across property set
  target_cct_k: 5500               # target correlated colour temperature (neutral-warm)
  per_room_override: false

stage4_look:
  method: lut3d                    # lut3d | hdrnet
  architecture: seplut             # lut3d | seplut | lutwithbgrid
  backbone: resnet18               # resnet18 (pretrained, 11M) | lightweight (35K)
  lut_size: 33                     # 3D LUT grid size
  lut_1d_size: 64                  # 1D per-channel curve size (seplut only)
  n_luts: 8                        # basis 3D LUTs — more = more expressive
  n_1d_luts: 8                     # basis 1D LUTs (seplut only)
  n_3d_luts: 8
  # LUTwithBGrid-specific
  n_lut_basis: 8                   # basis 3D LUTs for global grade
  n_grid_basis: 6                  # basis bilateral grids for spatial correction
  grid_size: 17                    # bilateral grid resolution
  n_grid_channels: 3               # per-node channels (3 = additive RGB offset)
  lut_model_path: models/lut3d/model_best.pth
  hdrnet_model_path: models/hdrnet/model_best.pth
  train:
    n_epochs: 800                  # more epochs; in-memory data makes each cheap
    lr: 0.0002
    batch_size: 8                  # default; override per GPU with --batch CLI flag
    train_size: 640                # default crop; RTX 3060 → 800, GTX 1660 → 640
    lpips_weight: 0.15             # slightly higher for more perceptual pull
    de_weight: 1.0                 # L* ΔE proxy loss weight (MSE in CIE L* space)
    brightness_norm: true
    target_brightness: 0.605
    lambda_monotonicity: 10.0     # LUTwithBGrid: prevents hue inversion
    lambda_tv: 0.0001             # LUTwithBGrid: LUT smoothness
    grad_clip: 1.0                # gradient clipping — training stability

stage5_benchmark:
  delta_e_threshold: 2.0           # ΔE2000 target ≲ 2 (Matt criterion 3)
  ms_ssim_threshold: 0.90
  lpips_threshold: 0.15
  wb_variance_threshold: 50        # max CCT swing across a property series
  highlight_protection_stops: 2    # top-2-stops must not clip (Matt requirement)
  contact_sheet:
    enabled: true
    output_dir: logs/contact_sheets
    labels:
      - Input
      - Ours
      - Autoenhance
      - "Matt's Reference"

stage6_zones:
  enabled: true
  sam_checkpoint: models/sam/sam_vit_b_01ec64.pth
  calibration_path: models/sam/zone_corrections.json   # generated by calibrate.py
  # Interior/exterior threshold: sky zone > this fraction → exterior
  exterior_sky_threshold: 0.08
  corrections:
    blend_sigma: 41              # Gaussian blur px for soft zone boundaries

io:
  raw_extensions: [".nef", ".cr2", ".cr3", ".arw", ".dng", ".raf", ".orf", ".rw2"]
  output_format: tiff              # tiff | jpeg
  output_quality: 95               # JPEG only
  output_bit_depth: 16

logging:
  level: INFO
  log_dir: logs
